name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK & AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease

      - name: Collect outputs
        run: |
          mkdir -p outputs
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -path "*/release/*" -exec cp {} outputs/ \;

      # ───────────────── MAIN BRANCH: Preview Release ─────────────────
      - name: Delete old preview release and tag
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete preview --cleanup-tag -y || true

      - name: Publish Preview Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: preview
          name: Preview Build
          commit: ${{ github.sha }}
          artifacts: outputs/*
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true

      # ───────────────── TAG v*.*.*: Versioned Release ─────────────────
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_FILE="CHANGELOG.md"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "notes=Release $VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { capture=0; found=0 }
            /^## \[/ {
              if (capture) { exit }
              if ($0 ~ "\\[" ver "\\]" || $0 ~ "\\[v" ver "\\]") {
                capture=1; found=1; next
              }
            }
            capture { print }
            END { if (!found) print "No changelog entry found for version " ver }
          ' "$CHANGELOG_FILE")

          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Versioned Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          commit: ${{ github.sha }}
          artifacts: outputs/*
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## STUDY4U v${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.notes }}
          prerelease: false
